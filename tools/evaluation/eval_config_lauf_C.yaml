# ── SUSI Evaluation — Lauf C (Juni 2026) ─────────────────────────
# Ziel: Reranker-Effekt + MMR vs Similarity + qwen vs llama
# Fragen: 293 (full_run aus testfragen_big_run.json)
# Runs:   20 Configs x 293 = 5.860
# Dauer:  ca. 8-10 Stunden (Overnight)

meta:
  name: "SUSI Eval Lauf C — Reranker + Algorithmus + LLM Vergleich"
  version: "3.0"
  datum: "2026-06-12"
  fragen_path: "tools/evaluation/testfragen_big_run.json"
  output_path: "tools/evaluation/results"

data_engineering:
  chunk_sizes:
    - 1000

  chunk_overlaps:
    - 50

  separators:
    default: ["## ", "### ", "\n\n", "\n", " "]

  embedding_models:
    - name: "bge-m3"
      dim: 1024
      active: true

  embedding_device: "cuda"

retrieval:
  top_k_values:
    - 3    # nur ohne Reranker
    - 5    # beide
    - 7    # nur mit Reranker
    - 9    # nur mit Reranker

  algorithms:
    - name: "similarity"
      active: true
    - name: "mmr"
      lambda_mult: 0.5
      active: true

  score_thresholds:
    - null

reranker:
  configs:
    - active: false
      model: null
      top_n: null
      top_k_filter: [3, 5]   # k=3 und k=5 ohne Reranker

    - active: true
      model: "BAAI/bge-reranker-v2-m3"
      top_n: 3
      top_k_filter: [5, 7, 9]  # k=5,7,9 mit Reranker

generation:
  llm_models:
    - name: "qwen2.5-coder:7b"
      active: true
    - name: "llama3.1:8b"
      active: true

  temperatures:
    - 0.0

  system_prompts:
    - name: "praezise_neu"
      active: true
      text: |
        Du bist ein praeziser KI-Assistent.
        Antworte basierend auf dem gegebenen Kontext.
        Wenn du die Antwort nicht eindeutig findest,
        gib an was du gefunden hast und markiere es als unsicher.
        Sage NICHT einfach "nicht verfuegbar" wenn relevanter
        Kontext vorhanden ist.
        Keine Spekulationen aus eigenem Wissen.
        Antworte in der Sprache in der du gefragt wirst, in vollstaendigen Saetzen.
        Sprich Martin IMMER mit "du" an.